set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# work around for: https://github.com/tmux-plugins/tmux-resurrect/issues/94
set -g default-command "/bin/zsh"

# scrolling
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

set -s escape-time 0

# split windows like vim
# vim's definition of a horizontal/vertical split is reversed from tmux's
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# switch between two latest windows
bind-key ^ last-window

bind-key S choose-session

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 5
bind > resize-pane -R 5
bind - resize-pane -D 5
bind + resize-pane -U 5

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# reload config
bind r source-file ~/.tmux.conf

# send the same command to all panes/windows/sessions
bind A command-prompt -p "Command:" \
       "run \"tmux list-panes -a -F '##{session_name}:##{window_index}.##{pane_index}' \
              | xargs -I PANE tmux send-keys -t PANE '%1' Enter\""

# enable focus events
set -g focus-events on

# vi-style controls for copy mode
setw -g mode-keys vi
unbind p
bind p paste-buffer
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi Escape send -X cancel
bind-key -Tcopy-mode-vi V send -X rectangle-toggle

# remap crtl+b to crtl+a
unbind C-b
set -g prefix C-a

# don't rename windows automatically
set-option -g allow-rename off

# history size
set-option -g history-limit 30000

# index from 1 instead 0
set -g base-index 1

# max session title size
set -g status-left-length 25
set -g status-right-length 45

set-option -g status-right '%Y-%m-%d %H:%M | #(TZ=UTC date +%%H:%%M)'

#### COLOUR
set -g @theme dark
source-file ~/.config/tmux/themes/dark.conf

# prefix T flips between dark and light
bind b if-shell '[ "#{@theme}" = dark ]' \
  'set -g @theme light; source-file ~/.config/tmux/themes/light.conf' \
  'set -g @theme dark;  source-file ~/.config/tmux/themes/dark.conf'

#### PLUGINS
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/bundle/'
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'schasse/tmux-jump'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '~/.cache/tmux/'

run '~/.config/tmux/plugins/tpm/tpm'

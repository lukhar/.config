# Solarized light (hex values for palette independence)
# base3=#fdf6e3 base2=#eee8d5 base1=#93a1a1 base0=#839496
# base00=#657b83 base01=#586e75 base02=#073642
# yellow=#b58900 orange=#cb4b16 red=#dc322f magenta=#d33682
# violet=#6c71c4 blue=#268bd2 cyan=#2aa198 green=#859900

set -g window-style 'fg=#93a1a1,bg=#eee8d5'
set -g window-active-style 'fg=#586e75,bg=#fdf6e3'

set-option -g status-style 'bg=#eee8d5,fg=#b58900'

set-window-option -g window-status-style 'fg=#268bd2,bg=#eee8d5'
set-window-option -g window-status-current-style 'fg=#dc322f,bg=default'

set-option -g pane-border-style 'fg=#859900,bg=#fdf6e3'
set-option -g pane-active-border-style 'fg=#859900,bg=#fdf6e3'

set-option -g message-style 'bg=#eee8d5,fg=#dc322f'
set-option -g message-command-style 'bg=#eee8d5,fg=#dc322f'

set-option -g display-panes-active-colour '#268bd2'
set-option -g display-panes-colour '#dc322f'

set-window-option -g clock-mode-colour '#859900'
